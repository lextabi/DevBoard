version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: devboard-postgres
    environment:
      POSTGRES_USER: devboard
      POSTGRES_PASSWORD: devboard_password
      POSTGRES_DB: devboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: devboard-backend
    environment:
      DATABASE_URL: postgresql://devboard:devboard_password@postgres:5432/devboard
      SUPABASE_URL: ${SUPABASE_URL:-http://postgres:5432}
      SUPABASE_KEY: ${SUPABASE_KEY:-test-key}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: devboard-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:5432}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-test-key}
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev

volumes:
  postgres_data:

networks:
  default:
    name: devboard-network
